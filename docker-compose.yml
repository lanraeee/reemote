version: '3.8'

# Reemote Connect — self-hosted deployment
# Usage: cp .env.docker.example .env && docker compose up -d

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: reemote-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-reemote}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-reemote}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-reemote} -d ${DB_NAME:-reemote}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - reemote-net

  # ── Node.js API server ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: reemote-api
    restart: unless-stopped
    environment:
      PORT: 8443
      DATABASE_URL: postgresql://${DB_USER:-reemote}:${DB_PASSWORD}@db:5432/${DB_NAME:-reemote}
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Reemote <noreply@reemote.app>}
      DOCKER_SOCKET: /var/run/docker.sock
      NODE_ENV: production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - frontend_build:/app/frontend/dist:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - reemote-net
    labels:
      reemote.service: api

  # ── Frontend (nginx) ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: reemote-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - reemote-net
    volumes:
      - frontend_build:/usr/share/nginx/html:rw
    labels:
      reemote.service: frontend

  # ── OS image builder (one-shot) ──────────────────────────────────────────────
  # Run: docker compose run --rm os-builder
  os-builder:
    image: docker:24-cli
    container_name: reemote-os-builder
    profiles: ["build-os"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/os:/workspace/os:ro
    working_dir: /workspace
    command: sh -c "
      echo '>>> Building OS container images...' &&
      docker build -t reemote-os/ubuntu-2204:latest  os/ubuntu-2204  &&
      docker build -t reemote-os/debian-12:latest    os/debian-12    &&
      docker build -t reemote-os/centos-9:latest     os/centos-9     &&
      docker build -t reemote-os/alpine-3:latest     os/alpine-3     &&
      docker build -t reemote-os/fedora-39:latest    os/fedora-39    &&
      echo '>>> All OS images built successfully.'
    "

# ── OS containers are created dynamically by the API ────────────────────────
# They attach to the reemote-os-net network automatically.

networks:
  reemote-net:
    driver: bridge
  reemote-os-net:
    name: reemote-os-net
    driver: bridge

volumes:
  db_data:
  frontend_build:
